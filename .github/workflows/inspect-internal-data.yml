name: Inspect internal data (propulse-business-87f7a — READ ONLY)

# Manual trigger only. READ-ONLY inventory of the sibling apps' Firestore data in the shared
# project (databases, root collections, field names/types) so strategic360 can wire its quanti
# views (Indicateurs/Valeur/Portefeuille/Simulateur) to the real internal data instead of Excel
# imports. Never writes anything — see functions/inspectInternalData.js.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "inspect" pour confirmer (lecture seule)'
        required: true
      databases:
        description: 'Ids des bases Firestore à inspecter (séparés par des virgules)'
        required: false
        default: '(default)'
      mode:
        description: 'full (dump complet) ou roots (collections racine + ids de docs seulement)'
        required: false
        default: 'full'
      path:
        description: 'Chemin de document à inspecter en profondeur (ex: workspaces/ws_xyz) — prime sur mode'
        required: false
        default: ''

# GITHUB_TOKEN réduit à la lecture (audit 2026-07) : ces workflows s'authentifient via le
# service account GCP et n'écrivent jamais dans GitHub.
permissions:
  contents: read

jobs:
  inspect:
    name: Inventory sibling-app Firestore data (read-only)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Refuse to run without explicit confirmation
        if: ${{ github.event.inputs.confirm != 'inspect' }}
        run: |
          echo "Le champ 'confirm' doit valoir exactement 'inspect'. Annulé."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STRATEGIC360 }}

      - name: List Firestore databases in the project
        run: gcloud firestore databases list --project=propulse-business-87f7a --format="table(name, type, locationId)" || true

      - name: Run inspectInternalData.js (read-only)
        working-directory: functions
        env:
          GCLOUD_PROJECT: propulse-business-87f7a
          INSPECT_DATABASE_IDS: ${{ github.event.inputs.databases }}
          INSPECT_MODE: ${{ github.event.inputs.mode }}
          INSPECT_PATH: ${{ github.event.inputs.path }}
        run: node inspectInternalData.js
