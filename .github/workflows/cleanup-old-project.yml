name: Cleanup OLD project (propulse-business-87f7a) — strategic360 resources ONLY

# DECOMMISSION apres migration vers sentinel-360. Supprime UNIQUEMENT les ressources propres a
# strategic360 dans l'ANCIEN projet PARTAGE propulse-business-87f7a : ses 35 Cloud Functions
# (codebase veille) + leurs jobs Cloud Scheduler, sa base Firestore NOMMEE "strategic360", ses 2
# buckets Storage (strategic360, strategic360-backups), son site Hosting "strategic360".
#
# NE TOUCHE JAMAIS : le projet lui-meme, la base "(default)", la base "nt360" (app soeur), ni aucune
# fonction / bucket / site d'une autre app du projet partage. IRREVERSIBLE en mode apply.
#
#   mode=report (defaut) : LECTURE SEULE — liste ce qui SERAIT supprime, n'efface rien.
#   mode=apply            : supprime effectivement.
#
# AUTH : utilise un secret DEDIE `GCP_SA_KEY_OLD_PROJECT` (cle d'un service account de l'ANCIEN projet
# ayant les droits de suppression : cloudfunctions.admin, datastore.owner, storage.admin,
# cloudscheduler.admin, firebasehosting.admin). Le secret de deploiement de sentinel-360
# (GCP_SA_KEY_STRATEGIC360) N'EST PAS utilise ici — impossible de viser le mauvais projet.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "cleanup" pour confirmer'
        required: true
      mode:
        description: 'report (lecture seule) ou apply (supprime)'
        required: false
        default: 'report'

permissions:
  contents: read

env:
  OLD_PROJECT: propulse-business-87f7a
  REGION: europe-west1
  DB_NAME: strategic360
  # Liste BLANCHE des 35 fonctions strategic360 (codebase veille) — source: exports de functions/index.js.
  FUNCS: >-
    ingestInternal syncSources syncSourcesNow dedupeIntelItemsNow evaluateIntelItemsNow
    evaluateIntelItemsScheduled classifyAI onIntelItemWrite rescoreDaily aiHealthCheck
    snapshotVeilleKpis backfillKpiHistory aggregateVeilleExec generateBriefing generateBriefingWeekly
    sendDailyDigest enrichStrategicArtifacts enrichNow setPipelineConfig copiloteGenerate copiloteChat
    onboardCompany applyOnboardingDraft syncInternalQuanti syncInternalQuantiNow syncCopiloteAccounts
    syncCopiloteAccountsNow listCopiloteAccounts copiloteAdmin exportPdf scheduledFirestoreExport
    purgeAuditLog purgeArchivedIntelItems setUserRole setPermissionsMatrix

jobs:
  cleanup:
    name: Decommission strategic360 in the old project
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Refuse without confirmation
        if: ${{ github.event.inputs.confirm != 'cleanup' }}
        run: |
          echo "Le champ 'confirm' doit valoir exactement 'cleanup'. Annule."
          exit 1

      - name: Guard — never target sentinel-360
        run: |
          if [ "$OLD_PROJECT" = "sentinel-360" ] || [ -z "$OLD_PROJECT" ]; then
            echo "::error::Garde-fou: OLD_PROJECT vaut '$OLD_PROJECT' — refus (ce workflow ne doit viser QUE l'ancien projet)."
            exit 1
          fi
          echo "Cible: $OLD_PROJECT (region $REGION), base $DB_NAME, mode ${{ github.event.inputs.mode }}"

      - name: Authenticate to Google Cloud (OLD project)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_OLD_PROJECT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Inventory (report) or delete (apply) — Cloud Functions + Scheduler
        run: |
          set +e
          MODE="${{ github.event.inputs.mode }}"
          echo "=== Fonctions strategic360 presentes dans $OLD_PROJECT ==="
          for F in $FUNCS; do
            EXISTS=$(gcloud functions describe "$F" --gen2 --region="$REGION" --project="$OLD_PROJECT" --format="value(name)" 2>/dev/null)
            if [ -n "$EXISTS" ]; then
              if [ "$MODE" = "apply" ]; then
                echo "[APPLY] delete function $F"
                gcloud functions delete "$F" --gen2 --region="$REGION" --project="$OLD_PROJECT" --quiet || echo "::warning::echec suppression fonction $F"
              else
                echo "[REPORT] a supprimer: fonction $F"
              fi
            else
              echo "(absente) $F"
            fi
          done
          echo "=== Jobs Cloud Scheduler firebase-schedule-* (onSchedule strategic360) ==="
          for F in $FUNCS; do
            JOB=$(gcloud scheduler jobs list --project="$OLD_PROJECT" --location="$REGION" --format="value(name)" --filter="name:firebase-schedule-$F" 2>/dev/null | head -n1)
            if [ -n "$JOB" ]; then
              if [ "$MODE" = "apply" ]; then
                echo "[APPLY] delete scheduler $JOB"
                gcloud scheduler jobs delete "$JOB" --project="$OLD_PROJECT" --location="$REGION" --quiet || echo "::warning::echec suppression job $JOB"
              else
                echo "[REPORT] a supprimer: scheduler $JOB"
              fi
            fi
          done

      - name: Firestore named database "strategic360"
        run: |
          set +e
          MODE="${{ github.event.inputs.mode }}"
          echo "=== Base Firestore nommee $DB_NAME (n'affecte PAS (default) ni nt360) ==="
          gcloud firestore databases describe --database="$DB_NAME" --project="$OLD_PROJECT" --format="value(name,locationId)" 2>/dev/null
          if [ "$MODE" = "apply" ]; then
            echo "[APPLY] delete database $DB_NAME"
            gcloud firestore databases delete --database="$DB_NAME" --project="$OLD_PROJECT" --quiet || echo "::warning::echec suppression base $DB_NAME"
          else
            echo "[REPORT] a supprimer: base $DB_NAME"
          fi

      - name: "Storage buckets (PII: imports/exports/backups)"
        run: |
          set +e
          MODE="${{ github.event.inputs.mode }}"
          for B in strategic360 strategic360-backups; do
            EXISTS=$(gcloud storage buckets describe "gs://$B" --project="$OLD_PROJECT" --format="value(name)" 2>/dev/null)
            if [ -n "$EXISTS" ]; then
              if [ "$MODE" = "apply" ]; then
                echo "[APPLY] vide + supprime gs://$B"
                gcloud storage rm --recursive "gs://$B/**" --project="$OLD_PROJECT" 2>/dev/null || true
                gcloud storage buckets delete "gs://$B" --project="$OLD_PROJECT" --quiet || echo "::warning::echec suppression bucket $B"
              else
                echo "[REPORT] a vider+supprimer: gs://$B"
              fi
            else
              echo "(absent) gs://$B"
            fi
          done

      - name: Hosting site "strategic360"
        run: |
          set +e
          MODE="${{ github.event.inputs.mode }}"
          echo "=== Sites Hosting du projet (verifier que 'strategic360' est bien celui de cette app) ==="
          firebase hosting:sites:list --project "$OLD_PROJECT" 2>&1 | head -50
          if [ "$MODE" = "apply" ]; then
            echo "[APPLY] delete hosting site strategic360"
            firebase hosting:sites:delete strategic360 --project "$OLD_PROJECT" --force 2>&1 || echo "::warning::echec suppression site Hosting strategic360 (supprimer manuellement si besoin)."
          else
            echo "[REPORT] a supprimer: site Hosting strategic360"
          fi

      - name: Done
        run: echo "Cleanup ${{ github.event.inputs.mode }} termine. En mode report, rien n'a ete supprime."
