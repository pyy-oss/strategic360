name: Deploy (sentinel-360 / strategic360)

# Manual trigger ONLY (workflow_dispatch), by design: auto-deploying on every push to main would be
# one bad merge away from breaking production. Once confidence is established, this can be changed to
# also run `on: push: branches: [main]` — see README.md § Déploiement.
#
# Deploie dans le projet Firebase DEDIE "sentinel-360" (migration 2026-07 — voir docs/MIGRATION.md).
# Consumes ONE repository secret: GCP_SA_KEY_STRATEGIC360 (a Firebase/GCP service account JSON
# key, base64-free — paste the raw JSON file content). See README.md § Déploiement > "Créer le
# secret GitHub Actions" for how to create the service account and add this secret. This workflow
# only ever deploys the resources this app owns (hosting site "sentinelnt-360", Firestore database
# "sentinel360", Storage bucket "sentinel-360.firebasestorage.app", Functions codebase "veille").

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "deploy" pour confirmer un déploiement dans le projet dédié sentinel-360'
        required: true

# Durcissement (audit 2026-07) : ce workflow s'authentifie via le service account GCP — il n'a
# besoin d'AUCUNE écriture GitHub. Le GITHUB_TOKEN est réduit à la lecture du contenu.
permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    # Optional extra safety net: create a "production" Environment in the repo's Settings >
    # Environments with required reviewers, and this job will pause for manual approval before
    # touching the shared project. Harmless no-op if the Environment doesn't exist.
    environment: production
    steps:
      - name: Refuse to run without explicit confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "Le champ 'confirm' doit valoir exactement 'deploy'. Déploiement annulé."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # VITE_FIREBASE_* are Vite build-time env vars — Vite inlines them into the bundle at
      # `npm run build` time, they don't exist at runtime. Without them here, the deployed app
      # ships with no Firebase config at all (silent "Firebase n'est pas configuré" state).
      # Firebase web API keys are not secret (they identify the project only; security is
      # enforced by Auth/Rules/App Check, not by hiding the key — see Google's own docs), so
      # hardcoding them here is safe, same as FIREBASE_WEB_API_KEY in set-user-role.yml. Keep in
      # sync with web/.env.local (gitignored, local-dev-only copy of these same values).
      - name: Build web app
        working-directory: web
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCykx2RuRoxsI9YTUL3xvRZp2_UcZ_P4c4
          VITE_FIREBASE_AUTH_DOMAIN: sentinel-360.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: sentinel-360
          VITE_FIREBASE_STORAGE_BUCKET: sentinel-360.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "876373263153"
          VITE_FIREBASE_APP_ID: "1:876373263153:web:09d412dfcf265259d6e610"
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: sentinel360
          # App Check site key : pré-câblé sur le secret GitHub VITE_FIREBASE_APPCHECK_SITE_KEY.
          # Tant que le secret n'existe pas, ${{ ... }} vaut "" → App Check reste désactivé côté client
          # (le code gère la clé vide : avertissement, aucune contrainte). Pour activer App Check :
          # 1) enregistrer une clé reCAPTCHA v3 dans Firebase Console > App Check pour cette app web ;
          # 2) ajouter sa valeur comme secret repo VITE_FIREBASE_APPCHECK_SITE_KEY et redéployer ;
          # 3) vérifier que les clients envoient des jetons, PUIS passer APPCHECK_ENFORCE=true dans
          #    functions/.env.sentinel-360 (sinon tous les callables rejettent les requêtes).
          VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
        # npm ci (audit 2026-07, M2 CI/CD) : installe EXACTEMENT le package-lock testé en CI —
        # npm install résolvait des versions flottantes et pouvait déployer des deps non testées.
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STRATEGIC360 }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Split from the storage rules deploy below: the Firebase Storage Management API's
      # `defaultBucket.get` preflight check (triggered by ANY `--only storage` deploy, even when
      # firebase.json targets a non-default bucket) has repeatedly 403'd for the service account
      # in this shared project — see README.md § Créer le secret GitHub Actions for the exact IAM
      # role that unblocks it (roles/firebasestorage.admin, narrower than roles/firebase.admin).
      # Hosting/Firestore/Functions don't depend on that permission, so they shouldn't be held
      # hostage by it.
      - name: Deploy (hosting:strategic360, firestore, functions:veille)
        # --force : autorise la SUPPRESSION des fonctions retirées du code source (ex. fusion des
        # 3 triggers onWrite en un seul, audit 2026-07). Sans ça, en CI non-interactif, les
        # fonctions orphelines resteraient déployées et continueraient de se déclencher. Le scope
        # `--only …functions:veille` limite l'effet au codebase de CETTE app (projet partagé).
        run: >
          firebase deploy
          --project sentinel-360
          --only hosting:strategic360,firestore,functions:veille
          --non-interactive
          --force

      # Firebase ne pose PAS toujours le binding allUsers/run.invoker sur un callable 2nd-gen
      # NOUVELLEMENT créé (selon les permissions IAM du compte de service au moment de la création).
      # Sans lui, Cloud Run rejette la requête AVANT la fonction (« not authenticated / empty
      # Authorization header ») et le client voit un « internal » — alors que l'auth Firebase est en
      # réalité vérifiée DANS la fonction (requireCommercialCaller/…). On garantit donc ce binding,
      # de façon idempotente, sur les SEULS callables (onCall) du Copilote — jamais sur les fonctions
      # planifiées/déclencheurs (qui, elles, ne doivent pas être publiquement invocables).
      # Audit final pré-prod 2026-07 : la liste couvrait 5 callables Copilote ; elle est étendue aux 19
      # onCall (dont onboardCompany — TOUT PREMIER appel d'un tenant neuf) pour ne pas laisser un
      # callable injoignable après création (erreur « internal » opaque). onSchedule/onDocumentWritten
      # restent volontairement exclus (jamais publiquement invocables).
      - name: Ensure public invoker on all callables (idempotent)
        continue-on-error: true
        run: |
          for svc in applyonboardingdraft backfillkpihistory classifyai copiloteadmin copilotechat copilotegenerate dedupeintelitemsnow enrichnow evaluateintelitemsnow exportpdf generatebriefing listcopiloteaccounts onboardcompany setpermissionsmatrix setpipelineconfig setuserrole synccopiloteaccountsnow syncinternalquantinow syncsourcesnow useradmin webhookadmin webhookinbound setlensweights enrichtendersnow setclienttendermonitors; do
            gcloud run services add-iam-policy-binding "$svc" \
              --region=europe-west1 \
              --project=sentinel-360 \
              --member=allUsers \
              --role=roles/run.invoker \
              2>&1 || echo "::warning::binding run.invoker impossible pour $svc"
          done

      - name: Deploy (storage rules)
        id: deploy_storage
        continue-on-error: true
        run: >
          firebase deploy
          --project sentinel-360
          --only storage
          --non-interactive

      - name: Warn if storage rules deploy failed
        if: steps.deploy_storage.outcome == 'failure'
        run: |
          echo "::warning::Le déploiement de storage.rules a échoué (probablement roles/firebasestorage.admin manquant sur le compte de service — voir README.md). Hosting/Firestore/Functions ont été déployés avec succès malgré tout."
