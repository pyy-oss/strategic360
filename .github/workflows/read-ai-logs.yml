name: Read AI function logs (diagnostic)

# Manual diagnostic: dump recent ERROR/WARNING logs for the AI callables (copiloteGenerate,
# syncSources, classifyAI, generateBriefing, enrichStrategicArtifacts) to find why AI generation
# fails (e.g. Vertex model 404 vs a code error). Read-only; uses GCP_SA_KEY_STRATEGIC360.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "logs" pour confirmer'
        required: true

# GITHUB_TOKEN réduit à la lecture (audit 2026-07) : ces workflows s'authentifient via le
# service account GCP et n'écrivent jamais dans GitHub.
permissions:
  contents: read

jobs:
  read-logs:
    name: Read AI function logs
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Refuse to run without explicit confirmation
        if: ${{ github.event.inputs.confirm != 'logs' }}
        run: |
          echo "Le champ 'confirm' doit valoir exactement 'logs'. Annulé."
          exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STRATEGIC360 }}

      - name: Dump AI function error logs (last 2h)
        run: |
          for svc in copilotegenerate syncsources classifyai generatebriefing enrichstrategicartifacts evaluateintelitemsnow; do
            echo "================= $svc ================="
            gcloud logging read \
              "resource.type=\"cloud_run_revision\" resource.labels.service_name=\"$svc\" severity>=WARNING" \
              --project=sentinel-360 \
              --limit=25 \
              --format="value(timestamp, severity, textPayload)" \
              --freshness=2h \
              2>&1 || echo "::warning::lecture logs $svc impossible"
          done
