name: Run syncInternalQuanti now (sentinel-360 / strategic360)

# Manual trigger only. Force-runs the syncInternalQuanti scheduled Cloud Function immediately,
# instead of waiting for its daily 05:30 Africa/Abidjan slot — recomputes summaries/quanti from
# the sibling app nt360's Firestore database (read-only). Same scheduler-force-run pattern as
# run-sync-now.yml / run-enrich-now.yml.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "quanti" pour confirmer'
        required: true

# GITHUB_TOKEN réduit à la lecture (audit 2026-07) : ces workflows s'authentifient via le
# service account GCP et n'écrivent jamais dans GitHub.
permissions:
  contents: read

# Anti-empilement (audit couts GCP 2026-07) : un seul run de ce workflow a la fois.
# Pas de cancel-in-progress : on n'interrompt pas un traitement Vertex/Firestore en cours,
# le run suivant attend son tour (queued) au lieu de doubler le cout.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-quanti:
    name: Force-run syncInternalQuanti
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Refuse to run without explicit confirmation
        if: ${{ github.event.inputs.confirm != 'quanti' }}
        run: |
          echo "Le champ 'confirm' doit valoir exactement 'quanti'. Annulé."
          exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STRATEGIC360 }}

      - name: Find and run the syncInternalQuanti scheduler job
        run: |
          set -e
          JOB=$(gcloud scheduler jobs list \
            --project=sentinel-360 \
            --location=europe-west1 \
            --format="value(name)" \
            --filter="name:firebase-schedule-syncInternalQuanti" | head -n1)
          if [ -z "$JOB" ]; then
            echo "::error::Aucun job Cloud Scheduler trouvé pour syncInternalQuanti — vérifier qu'il est bien déployé (functions:veille)."
            gcloud scheduler jobs list --project=sentinel-360 --location=europe-west1
            exit 1
          fi
          echo "Running $JOB"
          gcloud scheduler jobs run "$JOB" --project=sentinel-360 --location=europe-west1

      - name: Wait for the function to run (Pub/Sub trigger is asynchronous)
        run: sleep 40

      - name: Fetch syncInternalQuanti logs
        run: |
          echo "--- Logs syncInternalQuanti (dernières exécutions) ---"
          gcloud functions logs read syncInternalQuanti \
            --project=sentinel-360 \
            --region=europe-west1 \
            --gen2 \
            --limit=100 \
            2>&1 || echo "::warning::Impossible de lire les logs — repli gcloud logging read."
          echo "--- Repli : gcloud logging read ---"
          gcloud logging read \
            'resource.type="cloud_run_revision" resource.labels.service_name="syncinternalquanti"' \
            --project=sentinel-360 \
            --limit=50 \
            --format="table(timestamp, severity, textPayload)" \
            --freshness=10m \
            2>&1 || true
