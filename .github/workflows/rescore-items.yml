name: Rescore intelItems (propulse-business-87f7a / strategic360)

# Manual trigger only. One-shot: réapplique computePriorityScore à tous les intelItems non
# archivés (nécessaire après un changement de barème de scoring — sinon le fil mélange ancien et
# nouveau barème). Idempotent. Voir functions/rescoreAll.js.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "rescore" pour confirmer'
        required: true

jobs:
  rescore:
    name: Rescore all intelItems
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Refuse to run without explicit confirmation
        if: ${{ github.event.inputs.confirm != 'rescore' }}
        run: |
          echo "Le champ 'confirm' doit valoir exactement 'rescore'. Annulé."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STRATEGIC360 }}

      - name: Run rescoreAll.js
        working-directory: functions
        env:
          GCLOUD_PROJECT: propulse-business-87f7a
          FIRESTORE_DATABASE_ID: strategic360
        run: node rescoreAll.js
