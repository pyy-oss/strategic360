name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web — build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  functions:
    name: Functions — tests + règles
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # L'émulateur Firestore (tests de règles) tourne sur la JVM.
      # firebase-tools requiert un JDK >= 21.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: npm install
      # Lint no-undef (durcissement 2026-07) : attrape les variables non déclarées (ex. le
      # ReferenceError clientProfile qui a cassé le Copilote en prod) que `node --check` ne voit pas.
      - run: npm run lint
      # Tests unitaires du domaine (240+) — auparavant JAMAIS exécutés en CI (le job ne faisait qu'install).
      - run: npm run test:unit
      # Tests des Security Rules Firestore sous émulateur (couvre les règles : actions, winLoss, copilote…).
      - run: npm i -g firebase-tools
      - run: npm run test:rules
